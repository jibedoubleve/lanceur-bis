# When a pull request is merged (and thus a push occurs),
# execute tests and release the packages on GitHub.
name: Release
on:
  push:
    branches: 
      - master
      - 'release/**'
jobs:
  build:
    name: Release
    runs-on: windows-latest
    steps:
      - name: Get the sources
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
                  
      - name: Restore dotnet tools
        run: dotnet tool restore

      - name: Restore packages
        run: dotnet restore

      - name: Install Inno Setup
        run: choco install innosetup -y        
        
      - name: Run the Cake script
        uses: cake-build/cake-action@v3
        env: 
          CAKE_PUBLIC_GITHUB_TOKEN: ${{secrets.CAKE_PUBLIC_GITHUB_TOKEN}}
          CAKE_PUBLIC_GITHUB_USERNAME: ${{secrets.CAKE_PUBLIC_GITHUB_USERNAME}}
        with:
          target: github       
  todo:
      runs-on: ubuntu-latest
      permissions:
          contents: write
          issues: write
          pull-requests: write
      steps:
          - name: Get the sources
            uses: actions/checkout@v6
  
          - name: TODO to Issue
            uses: alstr/todo-to-issue-action@64aca8fda7023259aada83ba44ad988c4c443657
            with:
                IDENTIFIERS: '[{"name": "TODO", "labels": ["ungroomed"]}]'
            env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}